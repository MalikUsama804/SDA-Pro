version: '3.8'

services:

  sda-platform:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: sda_project_container

    environment:
      - THREAT_INTEL_PROVIDER=MISP
      - ENABLE_CUSTOM_FEED=true
      - ENABLE_PAGERDUTY=true
      - RESPONSE_STRATEGY=BALANCED

      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sda_db
      - DB_USER=sda_user
      - DB_PASSWORD=sda_password

      - REDIS_HOST=redis
      - REDIS_PORT=6379

    depends_on:
      - postgres
      - redis

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - sda-network

  postgres:
    image: postgres:15

    container_name: sda_postgres

    restart: always

    environment:
      POSTGRES_DB: sda_db
      POSTGRES_USER: sda_user
      POSTGRES_PASSWORD: sda_password

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sda_user"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - sda-network

  redis:
    image: redis:7

    container_name: sda_redis

    restart: always

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - sda-network

networks:
  sda-network: